spin_manifest_version = 2

[application]
authors = ["Spin Framework Contributors"]
description = "A redis application."
name = "spin-redis"
version = "0.1.0"

[application.trigger.redis]
address = "redis://localhost:6379"

[[trigger.redis]]
channel = "messages"
component = "echo-message"

[component.echo-message]
source = "app.wasm"
[component.echo-message.build]
command = "componentize-py -w fermyon:spin/redis-trigger componentize app -o app.wasm"
